<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Juan José Lara Castillo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Encabezado -->
    <header class="page-header text-center py-5">
        <div class="container">
            <h1 class="display-4 fw-bold">Juan José Lara Castillo</h1>
            <p class="lead mb-0">Estudiante de Informática Empresarial</p>
        </div>
    </header>

    <!-- Navegación -->
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav gap-1">
                    <li class="nav-item"><a class="nav-link" href="index.html">← Volver al inicio</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Formulario de contacto -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="card-title section-title">📩 Contacto</h1>
                        <p class="text-muted mb-4">¿Quieres comunicarte conmigo? Llena el formulario y te responderé pronto.</p>

                        <form action="mailto:jlaracast@gmail.com" method="post" enctype="text/plain">

                            <div class="mb-3">
                                <label for="nombre" class="form-label fw-semibold">Nombre</label>
                                <input type="text" class="form-control" id="nombre" name="nombre"
                                    placeholder="Tu nombre completo" required>
                            </div>

                            <div class="mb-3">
                                <label for="correo" class="form-label fw-semibold">Correo electrónico</label>
                                <input type="email" class="form-control" id="correo" name="correo"
                                    placeholder="tucorreo@ejemplo.com" required>
                            </div>

                            <div class="mb-4">
                                <label for="mensaje" class="form-label fw-semibold">Mensaje</label>
                                <textarea class="form-control" id="mensaje" name="mensaje"
                                    rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Enviar mensaje</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-3 bg-dark text-light mt-4">
        <p class="mb-0">&copy; 2026 Juan José Lara Castillo · Informática Empresarial</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
