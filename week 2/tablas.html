<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #f0f2f5;
        }

        h2 {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        thead {
            background-color: #4a90d9;
            color: white;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        tbody tr:hover {
            background-color: #f5f8ff;
        }

        .badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge-admin    { background-color: #fde8cc; color: #d9731d; }
        .badge-editor   { background-color: #d4edda; color: #1e7e34; }
        .badge-viewer   { background-color: #d1ecf1; color: #0c6178; }

        .btn {
            padding: 5px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            margin-right: 4px;
        }

        .btn-edit   { background-color: #4a90d9; color: white; }
        .btn-delete { background-color: #e74c3c; color: white; }

        .btn-edit:hover   { background-color: #2f72b8; }
        .btn-delete:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <h2>Gestión de Usuarios</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Fecha de registro</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>#001</td>
                <td>Carlos Mendoza</td>
                <td>carlos@empresa.com</td>
                <td><span class="badge badge-admin">Admin</span></td>
                <td>12/01/2025</td>
                <td>
                    <button class="btn btn-edit">Editar</button>
                    <button class="btn btn-delete">Borrar</button>
                </td>
            </tr>
            <tr>
                <td>#002</td>
                <td>Laura Ríos</td>
                <td>laura@empresa.com</td>
                <td><span class="badge badge-editor">Editor</span></td>
                <td>03/03/2025</td>
                <td>
                    <button class="btn btn-edit">Editar</button>
                    <button class="btn btn-delete">Borrar</button>
                </td>
            </tr>
            <tr>
                <td>#003</td>
                <td>Andrés Torres</td>
                <td>andres@empresa.com</td>
                <td><span class="badge badge-viewer">Viewer</span></td>
                <td>17/06/2025</td>
                <td>
                    <button class="btn btn-edit">Editar</button>
                    <button class="btn btn-delete">Borrar</button>
                </td>
            </tr>
            <tr>
                <td>#004</td>
                <td>María López</td>
                <td>maria@empresa.com</td>
                <td><span class="badge badge-editor">Editor</span></td>
                <td>29/09/2025</td>
                <td>
                    <button class="btn btn-edit">Editar</button>
                    <button class="btn btn-delete">Borrar</button>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
