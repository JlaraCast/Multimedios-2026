<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Juan José Lara Castillo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="nav">
        <a href="index.html">← Volver al inicio</a>
    </nav>

    <div class="card">
        <h1>📩 Contacto</h1>
        <p class="subtitle">¿Quieres comunicarte conmigo? Llena el formulario y te responderé pronto.</p>

        <form class="form" action="mailto:jlaracast@gmail.com" method="post" enctype="text/plain">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo" placeholder="tucorreo@ejemplo.com" required>

            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" placeholder="Escribe tu mensaje aquí..." required></textarea>

            <button type="submit" class="btn">Enviar mensaje</button>
        </form>
    </div>

</body>
</html>
